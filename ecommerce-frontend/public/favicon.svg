<svg width="192" height="192" viewBox="0 0 192 192" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Define gradients for professional look -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e5e5e5;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="192" height="192" rx="48" fill="url(#bgGradient)"/>
  
  <!-- Outer ring for depth and elegance -->
  <circle cx="96" cy="96" r="85" fill="none" stroke="url(#accentGradient)" stroke-width="2" opacity="0.25"/>

  <!-- Shopping bag icon (main focus) -->
  <g transform="translate(45, 35)">
    <!-- Bag outline -->
    <path d="M 10 16 L 10 36 Q 10 42 16 42 L 88 42 Q 94 42 94 36 L 94 16" 
          stroke="url(#accentGradient)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#shadow)"/>
    
    <!-- Bag handles (thicker and more prominent) -->
    <path d="M 26 16 Q 26 2 52 2 Q 78 2 78 16" 
          stroke="url(#accentGradient)" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#shadow)"/>
    
    <!-- Shopping line inside bag -->
    <line x1="10" y1="24" x2="94" y2="24" stroke="url(#accentGradient)" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
    
    <!-- Decorative items inside bag (shopping items indicator) -->
    <circle cx="35" cy="32" r="3" fill="url(#accentGradient)" opacity="0.4"/>
    <circle cx="57" cy="30" r="3" fill="url(#accentGradient)" opacity="0.4"/>
    <circle cx="75" cy="33" r="3" fill="url(#accentGradient)" opacity="0.4"/>
  </g>

  <!-- "R" letter - Rajendra initial -->
  <text x="96" y="145" 
        font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" 
        font-size="64" 
        font-weight="800" 
        text-anchor="middle" 
        fill="url(#accentGradient)" 
        opacity="0.85"
        filter="url(#shadow)">
    R
  </text>

  <!-- Brand accent - small dots suggesting e-commerce ecosystem -->
  <g opacity="0.4">
    <circle cx="155" cy="50" r="4" fill="url(#accentGradient)"/>
    <circle cx="165" cy="75" r="3" fill="url(#accentGradient)"/>
    <circle cx="158" cy="100" r="2.5" fill="url(#accentGradient)"/>
  </g>

  <!-- Bottom accent line for polish -->
  <line x1="40" y1="175" x2="152" y2="175" stroke="url(#accentGradient)" stroke-width="2" stroke-linecap="round" opacity="0.2"/>
</svg>
